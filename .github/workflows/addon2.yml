# Build and release NVDA add-on
# Python 3.11: Compatible with NVDA 2025.3.3 and later
# Future: Python 3.13 support for NVDA 2026.1
name: Build and release NVDA add-on

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install scons Markdown flake8 flake8-tabs configobj gettext-windows

      - name: Build add-on
        run: scons

      - name: Extract version
        id: version
        run: python -c "import buildVars; print(f'VERSION={buildVars.addon_info[\"addon-version\"]}')" >> $GITHUB_OUTPUT
        shell: powershell

      - name: Check if release exists
        id: check_release
        run: |
          $tag = "v${{ steps.version.outputs.VERSION }}"
          $response = Invoke-WebRequest -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" -Headers @{"Authorization"="token ${{ secrets.GITHUB_TOKEN }}"} -ErrorAction SilentlyContinue
          if ($response.StatusCode -eq 200) {
            echo "exists=true" >> $GITHUB_OUTPUT
          } else {
            echo "exists=false" >> $GITHUB_OUTPUT
          }
        shell: powershell
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: '*.nvda-addon'
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'dev') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
