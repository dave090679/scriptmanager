# Build NVDA add-on
# Python 3.11: Compatible with NVDA 2025.3.3 and later
name: Build NVDA add-on

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install scons Markdown flake8 flake8-tabs configobj gettext-windows

      - name: Lint with flake8
        run: flake8 --exit-zero addon

      - name: Build add-on
        run: scons
